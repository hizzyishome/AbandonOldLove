<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" width="100%" height="100%">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="50%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#F093FB"/>
    </linearGradient>

    <linearGradient id="starGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <pattern id="techGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262D" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0D1117" rx="20"/>
  
  <rect width="100%" height="100%" fill="url(#techGrid)" rx="20" opacity="0.6"/>

  <g transform="translate(45, 30)">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#30363D" stroke-width="2" stroke-dasharray="6 4" />
    <circle cx="50" cy="50" r="36" fill="none" stroke="url(#starGrad)" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
    
    <polygon points="50,18 58.8,39.6 82.3,39.6 63.2,54.3 70.5,75.2 50,61.8 29.5,75.2 36.8,54.3 17.7,39.6 41.2,39.6" 
             fill="url(#starGrad)" filter="url(#glow)"/>
    
    <line x1="22" y1="78" x2="78" y2="22" stroke="#0D1117" stroke-width="10" stroke-linecap="round"/>
    <line x1="24" y1="76" x2="76" y2="24" stroke="#F5576C" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

    <circle cx="92" cy="15" r="3" fill="#00F2FE" filter="url(#glow)"/>
    <circle cx="8" cy="85" r="4" fill="#F093FB" filter="url(#glow)"/>
    <circle cx="15" cy="15" r="2" fill="#4FACFE"/>
  </g>

  <g transform="translate(170, 0)">
    <text x="0" y="86" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="52" fill="url(#mainGrad)" letter-spacing="1">AbandonOldLove</text>
    
    <text x="5" y="122" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="600" font-size="14" fill="#8B949E" letter-spacing="6">PURE LOCAL GITHUB STAR MANAGER</text>
  </g>
</svg>
